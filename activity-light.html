<script type="text/javascript">
    RED.nodes.registerType('activity-light',{
        category: 'function',
        color: '#DDAA99',
        defaults: {
            name: {value:""},
            timeoutSec: {value:5, required:true, validate:RED.validators.number()}
        },
        inputs:1,
        outputs:1,
        icon: "timer.svg",
        label: function() {
            return this.name||"Activity Light";
        }
    });
</script>

<script type="text/x-red" data-template-name="activity-light">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-timeoutSec"><i class="icon-time"></i> Timer (Sekunden)</label>
        <input type="number" id="node-input-timeoutSec" min="1" placeholder="5">
    </div>
</script>

<script type="text/x-red" data-help-name="activity-light">
    <p>Zeigt an, dass Nachrichten empfangen werden.</p>
    <p>Status turns green when a message is received, red after the timeout.</p>
    <p>Displays the date & time of the last event.</p>
</script>
